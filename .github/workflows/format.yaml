name: Format

on:
  push:
    branches:
      - main
  pull_request:

env:
  DEFAULT_PYTHON: 3.13

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Checkout repository
        uses: actions/checkout@v6
      - name: 🏗 Set up Python ${{ env.DEFAULT_PYTHON }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ env.DEFAULT_PYTHON }}
      - name: 🏗 Install uv
        uses: astral-sh/setup-uv@v7
      - name: 🏗 Install ruff
        run: uv sync --locked
      - name: 🚀 Run ruff
        run: uv tool run ruff format .
      - name: 🔍 Verify
        run: git diff --exit-code
  sort:
    name: sort JSON data
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Checkout repository
        uses: actions/checkout@v6
      - name: 🚀 Sort JSON data
        run: |
          find '.' \
            -type 'f' \
            -name '*.json' \
            -not -name 'hacs.json' \
            -not -name 'manifest.json' \
            -exec sh -c 'mv $1 $1.tmp; jq . --sort-keys $1.tmp > $1; rm $1.tmp' shell {} ";"
      - name: 🔍 Verify
        run: git diff --exit-code
