name: Update Version from Draft Release

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Checkout repository
        uses: actions/checkout@v4

      - name: 🔍 Get latest draft release version
        id: draft_release
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            
            const draftRelease = releases.data.find(release => release.draft === true);
            
            if (!draftRelease) {
              throw new Error('No draft release found');
            }
            
            // Extract version number from tag_name (e.g., "v1.2.3" -> "1.2.3")
            const version = draftRelease.tag_name.replace(/^v/, '');
            
            core.setOutput('version', version);
            console.log(`Found draft release version: ${version}`);

      - name: 🏗 Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.13'

      - name: 🏗 Install uv
        uses: astral-sh/setup-uv@v7

      - name: ✏️ Update pyproject.toml
        run: |
          # Update the version field in pyproject.toml
          sed -i 's/^version = .*/version = "${{ steps.draft_release.outputs.version }}"/' pyproject.toml

      - name: ✏️ Update manifest.json
        run: |
          # Update the version field in manifest.json
          sed -i 's/"version": "[^"]*"/"version": "${{ steps.draft_release.outputs.version }}"/' custom_components/solakon_one/manifest.json

      - name: 🚀 Regenerate uv.lock
        run: |
          uv lock

      - name: 📝 Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "chore: update version to ${{ steps.draft_release.outputs.version }}"
          title: "chore: Update version to ${{ steps.draft_release.outputs.version }}"
          labels: maintenance
          body: |
            Automatically updated version files with the latest draft release version.
            
            Updated files:
            - `pyproject.toml`
            - `custom_components/solakon_one/manifest.json`
            - `uv.lock`
            
            Version: `${{ steps.draft_release.outputs.version }}`
          branch: update-version-${{ steps.draft_release.outputs.version }}
          delete-branch: true
